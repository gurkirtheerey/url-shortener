services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - gomodcache:/go/pkg/mod
    environment:
      DATABASE_URL: postgres://shortener:shortener@db:5432/shortener?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - api

volumes:
  pgdata:
  gomodcache:
  dashboard_node_modules:
