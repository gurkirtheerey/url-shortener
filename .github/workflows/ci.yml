name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: url_shortener_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run migrations
        run: psql -f migrations/001_init.sql
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: url_shortener_test

      - name: Run tests
        run: go test -v -race ./...
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/url_shortener_test

      - name: Build
        run: go build -o server .

  dashboard:
    name: Dashboard (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Docker (build images)
    runs-on: ubuntu-latest
    needs: [go, dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Build Go API image
        run: docker build -t url-shortener-api .

      - name: Build Dashboard image
        run: docker build -t url-shortener-dashboard ./dashboard
